# /etc/nginx/sites-available/forest-db.benchaalia.com
#
# After placing this file:
#   sudo ln -s /etc/nginx/sites-available/forest-db.benchaalia.com \
#              /etc/nginx/sites-enabled/forest-db.benchaalia.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain SSL certificate:
#   sudo certbot --nginx -d forest-db.benchaalia.com -d www.forest-db.benchaalia.com

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name forest-db.benchaalia.com www.forest-db.benchaalia.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://forest-db.benchaalia.com$request_uri;
    }
}

# ── Redirect www → apex (HTTPS) ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.forest-db.benchaalia.com;

    ssl_certificate     /etc/letsencrypt/live/forest-db.benchaalia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forest-db.benchaalia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://forest-db.benchaalia.com$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name forest-db.benchaalia.com;

    ssl_certificate     /etc/letsencrypt/live/forest-db.benchaalia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forest-db.benchaalia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── GraphQL API (NestJS on port 5051) ─────────────────────────────────
    location /graphql {
        proxy_pass         http://127.0.0.1:5051/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }

    # ── Next.js static assets (long cache) ────────────────────────────────
    location /_next/static/ {
        proxy_pass       http://127.0.0.1:1996/_next/static/;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Next.js app (port 1996 via PM2) ───────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:1996;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
